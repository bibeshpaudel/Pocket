<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Redirect instantly -->
  <meta http-equiv="refresh" content="2; url=https://usepocket.vercel.app/" />

  <title>Redirecting…</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      font-family: "Inter", sans-serif;
      color: white;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      padding: 2.5rem 3rem;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 2rem;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    a {
      color: #fff;
      text-decoration: underline;
      font-weight: 500;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Redirecting…</h1>
    <p>You are being taken to the new website.</p>
    <p>If nothing happens, <a href="https://usepocket.vercel.app/">click here</a>.</p>
  </div>

  <script>
    // JS fallback redirect
    setTimeout(() => {
      window.location.href = "https://usepocket.vercel.app/";
    }, 2000);
  </script>
</body>
</html>
